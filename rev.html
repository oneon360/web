<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JAV HLS Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }
    input {
      padding: 10px;
      width: 200px;
    }
    button {
      padding: 10px 15px;
      margin-left: 10px;
    }
    video {
      margin-top: 20px;
      width: 80%;
      max-width: 900px;
    }
  </style>
</head>
<body>

<h2>JAV HLS Player</h2>

<input id="code" placeholder="Contoh: ABP-123">
<button onclick="playVideo()">Play</button>

<video id="video" controls></video>

<script>
async function playVideo() {
  const code = document.getElementById("code").value.toLowerCase();
  if (!code) return alert("Masukkan kode video");

  try {
    // ⚠️ GANTI dengan proxy kamu
    const proxy = "https://corsproxy.io/?";
    const url = proxy + encodeURIComponent(`https://missav.ws/dm1/en/${code}`);

    const res = await fetch(url);
    const html = await res.text();

    // parsing UUID
    const match = html.match(/\/([0-9a-fA-F-]{36})\/index\.m3u8/);
    if (!match) throw "UUID tidak ditemukan";

    const uuid = match[1];
    const m3u8 = `https://surrit.com/${uuid}/playlist.m3u8`;

    console.log("M3U8:", m3u8);

    const video = document.getElementById("video");

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(m3u8);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play();
      });
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = m3u8;
      video.play();
    }

  } catch (err) {
    alert("Gagal: " + err);
    console.error(err);
  }
}
</script>

</body>
</html>
